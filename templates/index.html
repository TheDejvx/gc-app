// ══════════════════════════════════════════════
//  SCRAMBLE READONLY (Översikt)
// ══════════════════════════════════════════════
function renderScrambleReadonly(d, targetId) {
  const el = document.getElementById(targetId);
  if (!el) return;
  if (!state.scramble_enabled || !state.scramble_matches) { el.innerHTML = ''; return; }

  const klanMap = {};
  d.klaner.forEach(k => { klanMap[k.id] = k; });

  function getHcp(klan, name) {
    if (!name) return null;
    const p = klan.spelare.find(s => s.namn === name);
    return p ? parseNum(p.hcp) : null;
  }

  function ptsChip(pts) {
    if (pts === null) return `<span class="pts-chip">–</span>`;
    const cls = pts === 3 ? 'win' : pts === 0 ? 'loss' : 'draw';
    return `<span class="pts-chip ${cls}">${fmtN(pts, 1)}</span>`;
  }

  const cardsHtml = state.scramble_matches.map((match) => {
    const kA = klanMap[match.klanA], kB = klanMap[match.klanB];
    if (!kA || !kB) return '';

    const pA = match.playersA || [null, null];
    const pB = match.playersB || [null, null];
    const hcpA = [getHcp(kA, pA[0]), getHcp(kA, pA[1])];
    const hcpB = [getHcp(kB, pB[0]), getHcp(kB, pB[1])];
    const teamHcpA = (hcpA[0] !== null && hcpA[1] !== null) ? scrambleTeamHcpObj(hcpA[0], hcpA[1]) : null;
    const teamHcpB = (hcpB[0] !== null && hcpB[1] !== null) ? scrambleTeamHcpObj(hcpB[0], hcpB[1]) : null;

    const rounds = match.rounds || [{scoreA:null,scoreB:null},{scoreA:null,scoreB:null}];
    const results = rounds.map((r, ri) =>
      scrambleRoundResult(parseInt2(r.scoreA), parseInt2(r.scoreB),
        ri === 0 ? teamHcpA?.front : teamHcpA?.back,
        ri === 0 ? teamHcpB?.front : teamHcpB?.back));
    const hasAny = results.some(r => r.ptsA !== null);
    const totA = results.reduce((s, r) => r.ptsA !== null ? s + r.ptsA : s, 0);
    const totB = results.reduce((s, r) => r.ptsB !== null ? s + r.ptsB : s, 0);

    const teamHtml = (klan, players, hcpObj) => `
      <div class="scramble-team">
        <div class="scramble-team-heading">
          <span class="klan-dot" style="background:${klan.color}"></span>${klan.name}
        </div>
        ${players.map((n, i) => `
          <div style="font-size:13px;padding:4px 0;color:${n ? '#333' : '#bbb'}">
            ${n || `Spelare ${i+1} ej vald`}
          </div>`).join('')}
        <div class="team-hcp-row">
          <span class="hcp-lbl">Team HCP</span>
          <span class="hcp-val">Ut: ${hcpObj ? hcpObj.front : '–'} · In: ${hcpObj ? hcpObj.back : '–'}</span>
        </div>
      </div>`;

    const roundsHtml = rounds.map((r, ri) => {
      const res = results[ri];
      const hcpLabel = ri === 0 ? `HCP: ${teamHcpA?.front ?? '–'} vs ${teamHcpB?.front ?? '–'}` : `HCP: ${teamHcpA?.back ?? '–'} vs ${teamHcpB?.back ?? '–'}`;
      return `
        <div class="scramble-round-row">
          <span class="scramble-round-label">R${ri + 1} (${ri === 0 ? 'Ut' : 'In'})<span class="scramble-round-hcp">${hcpLabel}</span></span>
          <span style="text-align:center;font-size:17px;font-weight:700;color:${r.scoreA !== null ? '#333' : '#ccc'}">${r.scoreA ?? '–'}</span>
          <span class="scramble-vs-lbl">vs</span>
          <span style="text-align:center;font-size:17px;font-weight:700;color:${r.scoreB !== null ? '#333' : '#ccc'}">${r.scoreB ?? '–'}</span>
          <div class="scramble-pts-pair">${ptsChip(res.ptsA)}${ptsChip(res.ptsB)}</div>
        </div>`;
    }).join('');

    return `
      <div class="scramble-matchup-card">
        <div class="scramble-matchup-header">
          <span class="klan-dot" style="background:${kA.color}"></span>${kA.name}
          <span class="vs-sep">vs</span>
          <span class="klan-dot" style="background:${kB.color}"></span>${kB.name}
        </div>
        <div class="scramble-teams-row">
          ${teamHtml(kA, pA, teamHcpA)}
          ${teamHtml(kB, pB, teamHcpB)}
        </div>
        <div class="scramble-rounds-section">${roundsHtml}</div>
        <div class="scramble-total-bar">
          <div class="total-bar-side">
            <span class="klan-dot" style="background:${kA.color}"></span>
            <span class="total-bar-pts" style="color:${kA.color}">${hasAny ? fmtN(totA,1) : '–'}</span>
            <span class="total-bar-lbl">poäng</span>
          </div>
          <div class="total-bar-vs">Totalt</div>
          <div class="total-bar-side right">
            <span class="total-bar-lbl">poäng</span>
            <span class="total-bar-pts" style="color:${kB.color}">${hasAny ? fmtN(totB,1) : '–'}</span>
            <span class="klan-dot" style="background:${kB.color}"></span>
          </div>
        </div>
      </div>`;
  }).join('');

  el.innerHTML = `
    <div class="scramble-section">
      <div class="scramble-section-title">⛳ 2v2 Scramble · Nässjö GK</div>
      ${cardsHtml}
    </div>`;
}

// ══════════════════════════════════════════════
//  SCRAMBLE RENDER
// ══════════════════════════════════════════════
function renderScramble(d, targetId) {
  const el = document.getElementById(targetId || 'scramble-section');
  if (!el) return;
  if (!state.scramble_enabled || !state.scramble_matches) { el.innerHTML = ''; return; }

  const focusedId = document.activeElement ? document.activeElement.id : null;
  const focusedSel = (document.activeElement && document.activeElement.selectionStart !== undefined)
    ? { s: document.activeElement.selectionStart, e: document.activeElement.selectionEnd } : null;

  const klanMap = {};
  d.klaner.forEach(k => { klanMap[k.id] = k; });

  // Build set of all selected players per klan across all matches
  const usedByKlan = {};
  state.scramble_matches.forEach(m => {
    [[m.klanA, m.playersA], [m.klanB, m.playersB]].forEach(([kid, players]) => {
      if (!usedByKlan[kid]) usedByKlan[kid] = new Set();
      (players || []).forEach(p => { if (p) usedByKlan[kid].add(p); });
    });
  });

  function getHcp(klan, name) {
    if (!name) return null;
    const p = klan.spelare.find(s => s.namn === name);
    return p ? parseNum(p.hcp) : null;
  }

  function ptsChip(pts) {
    if (pts === null) return `<span class="pts-chip">–</span>`;
    const cls = pts === 3 ? 'win' : pts === 0 ? 'loss' : 'draw';
    return `<span class="pts-chip ${cls}">${fmtN(pts, 1)}</span>`;
  }

  function teamBlock(klan, players, teamHcpObj, side, mi) {
    const hcps = players.map(n => getHcp(klan, n));
    const used = usedByKlan[klan.id] || new Set();

    const slots = [0, 1].map(slot => {
      const sel = players[slot] || '';
      const hcp = hcps[slot];
      const selOpts = `<option value="">– Välj spelare –</option>` +
        klan.spelare
          .filter(p => p.namn === sel || !used.has(p.namn))
          .map(p => `<option value="${p.namn}"${p.namn === sel ? ' selected' : ''}>${p.namn}${p.hcp ? ' ('+p.hcp+')' : ''}</option>`)
          .join('');
      return `
        <div class="scramble-player-slot">
          <label>Spelare ${slot + 1}</label>
          <select id="sc-sel-${mi}-${side}-${slot}" class="scramble-select${sel ? ' filled' : ''}"
            onchange="onScramblePlayer(${mi},'${side}',${slot},this.value)">${selOpts}</select>
        </div>`;
    }).join('');

    const frontVal = teamHcpObj ? teamHcpObj.front : null;
    const backVal  = teamHcpObj ? teamHcpObj.back  : null;

    return `
      <div class="scramble-team">
        <div class="scramble-team-heading">
          <span class="klan-dot" style="background:${klan.color}"></span>${klan.name}
        </div>
        ${slots}
        <div class="team-hcp-row">
          <span class="hcp-lbl">Team HCP</span>
          <span class="hcp-val">Ut: ${frontVal !== null ? frontVal : '–'} · In: ${backVal !== null ? backVal : '–'}</span>
        </div>
      </div>`;
  }

  const cardsHtml = state.scramble_matches.map((match, mi) => {
    const kA = klanMap[match.klanA], kB = klanMap[match.klanB];
    if (!kA || !kB) return '';

    const pA = match.playersA || [null, null];
    const pB = match.playersB || [null, null];
    const hcpA = [getHcp(kA, pA[0]), getHcp(kA, pA[1])];
    const hcpB = [getHcp(kB, pB[0]), getHcp(kB, pB[1])];
    const teamHcpA = (hcpA[0] !== null && hcpA[1] !== null) ? scrambleTeamHcpObj(hcpA[0], hcpA[1]) : null;
    const teamHcpB = (hcpB[0] !== null && hcpB[1] !== null) ? scrambleTeamHcpObj(hcpB[0], hcpB[1]) : null;

    const rounds = match.rounds || [{scoreA:null,scoreB:null},{scoreA:null,scoreB:null}];
    const results = rounds.map((r, ri) =>
      scrambleRoundResult(parseInt2(r.scoreA), parseInt2(r.scoreB),
        ri === 0 ? teamHcpA?.front : teamHcpA?.back,
        ri === 0 ? teamHcpB?.front : teamHcpB?.back));

    const hasAny = results.some(r => r.ptsA !== null);
    const totA = results.reduce((s, r) => r.ptsA !== null ? s + r.ptsA : s, 0);
    const totB = results.reduce((s, r) => r.ptsB !== null ? s + r.ptsB : s, 0);

    const roundsHtml = rounds.map((r, ri) => {
      const res = results[ri];
      const vA = r.scoreA !== null ? r.scoreA : '';
      const vB = r.scoreB !== null ? r.scoreB : '';
      const hcpLabel = ri === 0 ? `HCP: ${teamHcpA?.front ?? '–'} vs ${teamHcpB?.front ?? '–'}` : `HCP: ${teamHcpA?.back ?? '–'} vs ${teamHcpB?.back ?? '–'}`;
      return `
        <div class="scramble-round-row">
          <span class="scramble-round-label">R${ri + 1} (${ri === 0 ? 'Ut' : 'In'})<span class="scramble-round-hcp">${hcpLabel}</span></span>
          <input id="sc-score-${mi}-${ri}-A" class="scramble-score-inp${r.scoreA !== null ? ' filled' : ''}"
            type="text" inputmode="numeric" value="${vA}" placeholder="Slag"
            oninput="onScrambleScore(${mi},${ri},'A',this)">
          <span class="scramble-vs-lbl">vs</span>
          <input id="sc-score-${mi}-${ri}-B" class="scramble-score-inp${r.scoreB !== null ? ' filled' : ''}"
            type="text" inputmode="numeric" value="${vB}" placeholder="Slag"
            oninput="onScrambleScore(${mi},${ri},'B',this)">
          <div class="scramble-pts-pair">${ptsChip(res.ptsA)}${ptsChip(res.ptsB)}</div>
        </div>`;
    }).join('');

    return `
      <div class="scramble-matchup-card">
        <div class="scramble-matchup-header">
          <span class="klan-dot" style="background:${kA.color}"></span>${kA.name}
          <span class="vs-sep">vs</span>
          <span class="klan-dot" style="background:${kB.color}"></span>${kB.name}
        </div>
        <div class="scramble-teams-row">
          ${teamBlock(kA, pA, teamHcpA, 'A', mi)}
          ${teamBlock(kB, pB, teamHcpB, 'B', mi)}
        </div>
        <div class="scramble-rounds-section">${roundsHtml}</div>
        <div class="scramble-total-bar">
          <div class="total-bar-side">
            <span class="klan-dot" style="background:${kA.color}"></span>
            <span class="total-bar-pts" style="color:${kA.color}">${hasAny ? fmtN(totA,1) : '–'}</span>
            <span class="total-bar-lbl">poäng</span>
          </div>
          <div class="total-bar-vs">Totalt</div>
          <div class="total-bar-side right">
            <span class="total-bar-lbl">poäng</span>
            <span class="total-bar-pts" style="color:${kB.color}">${hasAny ? fmtN(totB,1) : '–'}</span>
            <span class="klan-dot" style="background:${kB.color}"></span>
          </div>
        </div>
      </div>`;
  }).join('');

  el.innerHTML = `
    <div class="scramble-section">
      <div class="scramble-section-title">⛳ 2v2 Scramble · Nässjö GK</div>
      ${cardsHtml}
    </div>`;

  if (focusedId) {
    const toFocus = document.getElementById(focusedId);
    if (toFocus) {
      toFocus.focus();
      if (focusedSel && toFocus.setSelectionRange) {
        toFocus.setSelectionRange(focusedSel.s, focusedSel.e);
      }
    }
  }
}

function onScramblePlayer(mi, side, slot, playerName) {
  if (!state.scramble_matches) return;
  const key = side === 'A' ? 'playersA' : 'playersB';
  if (!state.scramble_matches[mi][key]) state.scramble_matches[mi][key] = [null, null];
  state.scramble_matches[mi][key][slot] = playerName || null;
  markUnsaved();
  render();
}

function onScrambleScore(mi, ri, side, el) {
  if (!state.scramble_matches) return;
  const val = parseInt2(el.value.trim());
  const key = side === 'A' ? 'scoreA' : 'scoreB';
  if (!state.scramble_matches[mi].rounds) state.scramble_matches[mi].rounds = [{},{}];
  state.scramble_matches[mi].rounds[ri][key] = val;
  el.classList.toggle('filled', val !== null && el.value.trim() !== '');
  markUnsaved();
  render();
}

// ══════════════════════════════════════════════
//  INPUT HANDLERS
// ══════════════════════════════════════════════
function onInput(ki, pi, field, el) {
  const raw = el.value;
  if (field === 'namn') {
    state.klaner[ki].spelare[pi].namn = raw;
    markUnsaved();
    return; // no recalculation needed
  }
  const parsed = parseNum(raw.trim());
  state.klaner[ki].spelare[pi][field] = parsed;
  el.classList.toggle('filled', parsed !== null && raw.trim() !== '');
  markUnsaved();
  render();
}

// ══════════════════════════════════════════════
//  MAT OCH DRYCK
// ══════════════════════════════════════════════
function renderMatOchDryck() {
  const el = document.getElementById('sub-view-mat');
  if (!el) return;
  const md = state.mat_och_dryck;
  if (!md) { el.innerHTML = '<p style="padding:24px;color:#888">Ingen data.</p>'; return; }

  const flakSz = md.dryck?.flak_storlek || 24;
  const ol = md.dryck?.ol || [];
  const ovrigt = md.dryck?.ovrigt || [];
  const matLists = md.mat && !Array.isArray(md.mat) ? md.mat : { frukost: [], lunch: [], middag: [] };

  const olTotalFlak = ol.reduce((s, r) => s + (parseNum(r.antal_flak) || 0), 0);
  const olTotalKr   = ol.reduce((s, r) => s + (parseNum(r.pris) || 0) * (parseNum(r.antal_flak) || 0) * flakSz, 0);
  const ovTotalAnt  = ovrigt.reduce((s, r) => s + (parseNum(r.antal) || 0), 0);
  const ovTotalKr   = ovrigt.reduce((s, r) => s + (parseNum(r.pris) || 0) * (parseNum(r.antal) || 0), 0);

  const olRows = ol.map((r, i) => {
    const summa = (parseNum(r.pris) || 0) * (parseNum(r.antal_flak) || 0) * flakSz;
    return `<tr>
      <td><input class="md-inp" value="${r.namn}" oninput="onMdField('ol',${i},'namn',this.value)" onblur="render()"></td>
      <td><input class="md-inp num" value="${r.pris}" oninput="onMdField('ol',${i},'pris',this.value)" onblur="render()"></td>
      <td><input class="md-inp num" value="${r.antal_flak}" oninput="onMdField('ol',${i},'antal_flak',this.value)" onblur="render()"></td>
      <td class="md-summa">${fmtN(summa, 1)}</td>
      <td><button class="md-del-btn" onclick="onMdDel('ol',${i})">✕</button></td>
    </tr>`;
  }).join('');

  const ovRows = ovrigt.map((r, i) => {
    const summa = (parseNum(r.pris) || 0) * (parseNum(r.antal) || 0);
    return `<tr>
      <td><input class="md-inp" value="${r.namn}" oninput="onMdField('ovrigt',${i},'namn',this.value)" onblur="render()"></td>
      <td><input class="md-inp num" value="${r.pris}" oninput="onMdField('ovrigt',${i},'pris',this.value)" onblur="render()"></td>
      <td><input class="md-inp num" value="${r.antal}" oninput="onMdField('ovrigt',${i},'antal',this.value)" onblur="render()"></td>
      <td class="md-summa">${fmtN(summa, 1)}</td>
      <td><button class="md-del-btn" onclick="onMdDel('ovrigt',${i})">✕</button></td>
    </tr>`;
  }).join('');

  function matListHtml(key, label) {
    const items = matLists[key] || [];
    const ansvarigId = md.ansvarig?.[key] || '';
    const ansvarigKlan = (state.klaner || []).find(k => k.id === ansvarigId);
    const klanOptions = (state.klaner || []).map(k =>
      `<option value="${k.id}" ${ansvarigId === k.id ? 'selected' : ''}>${k.name}</option>`
    ).join('');
    const dot = ansvarigKlan ? `<span class="md-ansvarig-dot" style="background:${ansvarigKlan.color}"></span>` : '';
    const rows = items.map((r, i) => `
      <div class="mat-row">
        <input type="checkbox" class="mat-check" ${r.klar ? 'checked' : ''} onchange="onMatKlar('${key}',${i},this.checked)">
        <input class="md-inp mat-vara${r.klar ? ' klar' : ''}" value="${r.vara}" oninput="onMdMatField('${key}',${i},'vara',this.value)" onblur="render()">
        <input class="md-inp num mat-antal" value="${r.antal}" placeholder="Antal" oninput="onMdMatField('${key}',${i},'antal',this.value)" onblur="render()">
        <button class="md-del-btn" onclick="onMatDel('${key}',${i})">✕</button>
      </div>`).join('');
    return `
      <section class="md-section">
        <div class="md-section-header">
          <h2 class="md-heading">${label}</h2>
          <div class="md-ansvarig">
            ${dot}
            <select class="md-ansvarig-sel" onchange="onMdAnsvarig('${key}',this.value)">
              <option value="">– Ansvarig klan –</option>
              ${klanOptions}
            </select>
          </div>
        </div>
        <div class="mat-list">${rows}</div>
        <button class="md-add-btn" onclick="onMatAdd('${key}')">+ Lägg till vara</button>
      </section>`;
  }

  withFocus(() => { el.innerHTML = `
    <main class="tab-main">
      <section class="md-section">
        <h2 class="md-heading">🍺 Öl GC</h2>
        <div class="md-flak-row">
          <span class="md-flak-lbl">Flak =</span>
          <input class="md-inp num" style="width:60px" value="${flakSz}" oninput="onMdFlakSz(this.value)" onblur="render()"> burkar
        </div>
        <table class="md-table">
          <thead><tr><th>Namn</th><th>Pris/burk</th><th>Antal flak</th><th>Summa</th><th></th></tr></thead>
          <tbody>${olRows}</tbody>
          <tfoot><tr class="md-total-row"><td colspan="2">Totalt</td><td>${olTotalFlak} flak</td><td>${fmtN(olTotalKr, 1)} kr</td><td></td></tr></tfoot>
        </table>
        <button class="md-add-btn" onclick="onMdAdd('ol')">+ Lägg till öl</button>
      </section>

      <section class="md-section">
        <h2 class="md-heading">🍷 Övrigt</h2>
        <table class="md-table">
          <thead><tr><th>Namn</th><th>Pris/flaska</th><th>Antal</th><th>Summa</th><th></th></tr></thead>
          <tbody>${ovRows}</tbody>
          <tfoot><tr class="md-total-row"><td colspan="2">Totalt</td><td>${ovTotalAnt} flaskor</td><td>${fmtN(ovTotalKr, 1)} kr</td><td></td></tr></tfoot>
        </table>
        <button class="md-add-btn" onclick="onMdAdd('ovrigt')">+ Lägg till dryck</button>
      </section>

      <section class="md-section md-summary-row">
        <span class="md-sum-lbl">Totalt alkohol</span>
        <span class="md-sum-val">${fmtN(olTotalKr + ovTotalKr, 1)} kr</span>
      </section>

      ${matListHtml('frukost', '🍳 Frukost')}
      ${matListHtml('lunch',   '🥗 Lunch')}
      ${matListHtml('middag',  '🍽️ Middag')}
    </main>`; });
}

function onMdFlakSz(val) {
  if (!state.mat_och_dryck?.dryck) return;
  state.mat_och_dryck.dryck.flak_storlek = parseInt2(val) || 24;
  markUnsaved();
}
function onMdField(list, idx, field, val) {
  const arr = list === 'ol' ? state.mat_och_dryck.dryck.ol : state.mat_och_dryck.dryck.ovrigt;
  arr[idx][field] = field === 'namn' ? val : (parseNum(val) ?? val);
  markUnsaved();
}
function onMdDel(list, idx) {
  const arr = list === 'ol' ? state.mat_och_dryck.dryck.ol : state.mat_och_dryck.dryck.ovrigt;
  arr.splice(idx, 1);
  markUnsaved(); render();
}
function onMdAdd(list) {
  if (list === 'ol') state.mat_och_dryck.dryck.ol.push({ namn: '', pris: 0, antal_flak: 1 });
  else state.mat_och_dryck.dryck.ovrigt.push({ namn: '', pris: 0, antal: 1 });
  markUnsaved(); render();
}
function onMdMatField(key, idx, field, val) {
  state.mat_och_dryck.mat[key][idx][field] = val;
  markUnsaved();
}
function onMatKlar(key, idx, val) {
  state.mat_och_dryck.mat[key][idx].klar = val;
  markUnsaved(); render();
}
function onMatDel(key, idx) {
  state.mat_och_dryck.mat[key].splice(idx, 1);
  markUnsaved(); render();
}
function onMatAdd(key) {
  state.mat_och_dryck.mat[key].push({ vara: '', antal: '', klar: false });
  markUnsaved(); render();
}
function onMdAnsvarig(key, val) {
  if (!state.mat_och_dryck.ansvarig) state.mat_och_dryck.ansvarig = {};
  state.mat_och_dryck.ansvarig[key] = val || null;
  markUnsaved(); render();
}

function onKlan4ManScramble(ki, el) {
  const raw = el.value.trim();
  const gross = parseInt2(raw);
  state.klaner[ki].klan_scramble_gross = gross;
  el.classList.toggle('filled', gross !== null && raw !== '');
  markUnsaved();
  render();
}

function onSkytteRound(ki, pi, ri, el) {
  const raw = el.value.trim();
  let parsed = parseInt2(raw);
  if (parsed !== null && parsed > SKYTTE_ROUND_MAX) {
    parsed = SKYTTE_ROUND_MAX;
    el.value = String(parsed);
  }
  if (!state.klaner[ki].spelare[pi].skytte_rounds)
    state.klaner[ki].spelare[pi].skytte_rounds = [null, null, null, null];
  state.klaner[ki].spelare[pi].skytte_rounds[ri] = parsed;
  el.classList.toggle('filled', parsed !== null && raw !== '');
  markUnsaved();
  render();
}

function onKlanSlag(ki, el) {
  const raw = el.value.trim();
  const parsed = parseInt2(raw);
  state.klaner[ki].klan_slag = parsed;
  el.classList.toggle('filled', parsed !== null && raw !== '');
  markUnsaved();
  render();
}

function markUnsaved() {
  unsaved = true;
  document.getElementById('save-status').textContent = '● Osparade ändringar';
  clearTimeout(_autoSaveTimer);
  _autoSaveTimer = setTimeout(async () => {
    if (!unsaved || state.locked) return;
    try {
      const resp = await fetch('/api/save', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(state)
      });
      const res = await resp.json();
      if (res.status === 'ok') {
        unsaved = false;
        document.getElementById('save-status').textContent = '';
      }
    } catch(e) { /* silent — manual Spara still available */ }
  }, 1500);
}

// ══════════════════════════════════════════════
//  LOCK / NEW YEAR
// ══════════════════════════════════════════════
function applyLockUI() {
  const locked = !!state.locked;
  const vc = document.getElementById('view-current');
  const banner = document.getElementById('locked-banner');
  const lockBtn = document.getElementById('lock-btn');
  const saveBtn = document.getElementById('save-btn');
  const saveStatus = document.getElementById('save-status');

  vc.classList.toggle('year-locked', locked);
  if (banner) banner.style.display = locked ? '' : 'none';
  if (lockBtn) lockBtn.textContent = locked ? '🔒' : '🔓';
  if (saveBtn) saveBtn.style.display = locked ? 'none' : '';
  if (saveStatus) saveStatus.style.display = locked ? 'none' : '';
}

function toggleLock() {
  state.locked = !state.locked;
  applyLockUI();
  markUnsaved();
  if (!state.locked) render();
}

function newYear() {
  const pw = prompt('Ange lösenord för att skapa nytt år:');
  if (pw === null) return;
  if (pw !== 'storsnopp1') { alert('Fel lösenord.'); return; }
  const next = (state.year || 2026) + 1;
  if (!confirm(`Skapa ny säsong ${next}?\n\nNuvarande år (${state.year}) arkiveras i historiken men förblir olåst så att du kan fortsätta redigera det.\nAlla poäng och matcher nollställs för ${next}.`)) return;

  const snapshot = {
    year: state.year,
    course: JSON.parse(JSON.stringify(state.course)),
    klaner: JSON.parse(JSON.stringify(state.klaner)),
    kgolf_formula: state.kgolf_formula || 'scramble_plus_snitt',
    locked: false
  };
  if (!state.history) state.history = [];
  state.history.unshift(snapshot);

  state.year = next;
  state.locked = false;
  state.klaner.forEach(klan => {
    klan.klan_slag = null;
    klan.klan_scramble_gross = null;
    klan.spelare.forEach(p => {
      p.slag = null; p.skytte = null; p.dart = null;
      p.skytte_rounds = [null, null, null, null];
    });
  });
  if (state.scramble_matches) {
    state.scramble_matches.forEach(m => {
      m.playersA = [null, null]; m.playersB = [null, null];
      m.rounds = [{ scoreA: null, scoreB: null }, { scoreA: null, scoreB: null }];
    });
  }
  if (state.mat_och_dryck?.mat) {
    state.mat_och_dryck.mat = { frukost: [], lunch: [], middag: [] };
  }

  buildTabs(); switchTab('current'); buildSubTabs(); updateSubtitle(); render();
  markUnsaved();
}

function toggleHistLock(year) {
  const hist = (state.history || []).find(h => h.year == year);
  if (!hist) return;
  hist.locked = !hist.locked;
  markUnsaved();
  renderHistoryView(year);
}

function onHistField(year, ki, pi, field, val) {
  const hist = (state.history || []).find(h => h.year == year);
  if (!hist || hist.locked) return;
  const p = hist.klaner[ki].spelare[pi];
  p[field] = field === 'hcp' ? (parseNum(val) ?? null) : (parseInt2(val) ?? null);
  markUnsaved();
}

function onHistKlanField(year, ki, field, val) {
  const hist = (state.history || []).find(h => h.year == year);
  if (!hist || hist.locked) return;
  hist.klaner[ki][field] = parseInt2(val) ?? null;
  markUnsaved();
}

// ══════════════════════════════════════════════
//  LOAD / SAVE
// ══════════════════════════════════════════════
async function loadData() {
  const resp = await fetch('/api/data');
  state = await resp.json();

  // Init missing fields (backwards compat) — track if anything changed so we
  // can immediately write the migrated state back to the DB.
  let _migrated = false;
  if (state.klaner) {
    state.klaner.forEach(klan => {
      if (klan.klan_scramble_gross === undefined) { klan.klan_scramble_gross = null; _migrated = true; }
      klan.spelare.forEach(p => {
        if (!p.skytte_rounds) { p.skytte_rounds = [null, null, null, null]; _migrated = true; }
      });
    });
  }
  if (!state.mat_och_dryck) {
    state.mat_och_dryck = {
      dryck: { flak_storlek: 24, ol: [], ovrigt: [] },
      mat: { frukost: [], lunch: [], middag: [] }
    };
    _migrated = true;
  } else if (Array.isArray(state.mat_och_dryck.mat)) {
    state.mat_och_dryck.mat = { frukost: state.mat_och_dryck.mat, lunch: [], middag: [] };
    _migrated = true;
  }
  if (state.locked === undefined) { state.locked = false; _migrated = true; }
  if (state.mat_och_dryck && !state.mat_och_dryck.ansvarig) {
    state.mat_och_dryck.ansvarig = { frukost: null, lunch: null, middag: null }; _migrated = true;
  }
  if (state.mat_och_dryck?.mat?.middag?.length === 0) {
    state.mat_och_dryck.mat.middag = [
      { vara: 'Hamburgare frysta',  antal: '32',      klar: false },
      { vara: 'Hamburgerbröd',      antal: '24',      klar: false },
      { vara: 'Cheddar ost',        antal: '3 paket', klar: false },
      { vara: 'Tomater',            antal: '6',       klar: false },
      { vara: 'Gula lökar',         antal: '4',       klar: false },
      { vara: 'Jalapenos i burk',   antal: '',        klar: false },
      { vara: 'Ketchup',            antal: '',        klar: false },
      { vara: 'Senap',              antal: '',        klar: false },
      { vara: 'Hamburgerdressing',  antal: '',        klar: false },
      { vara: 'Hotsauce',           antal: '',        klar: false },
    ];
    _migrated = true;
  }
  if (!state._frukost_seeded) {
    (state.mat_och_dryck?.mat?.frukost || []).push(
      { vara: 'Ägg',                          antal: '100',     klar: false },
      { vara: 'Pågenlimpa (eller mot. bröd)', antal: '4',       klar: false },
      { vara: 'Yogurt',                        antal: '2 paket', klar: false },
      { vara: 'Apelsinjuice 2L',               antal: '10',      klar: false },
      { vara: 'Falukorv',                      antal: '2',       klar: false },
      { vara: 'Kaffe',                         antal: '3 paket', klar: false },
      { vara: 'Resorb',                        antal: '10 rör',  klar: false },
      { vara: 'Skinka',                        antal: '1 paket', klar: false },
      { vara: 'Pepparsalami',                  antal: '1 paket', klar: false }
    );
    state._frukost_seeded = true;
    _migrated = true;
  }
  if (!state._middag_bolognese) {
    (state.mat_och_dryck?.mat?.middag || []).push(
      { vara: 'Köttfärs',              antal: '3 kg',    klar: false },
      { vara: 'Spagetti',              antal: '3 paket', klar: false },
      { vara: 'Gula lökar',            antal: '6',       klar: false },
      { vara: 'Vitlök',               antal: '2',       klar: false },
      { vara: 'Tomatpuré',             antal: '1',       klar: false },
      { vara: 'Krossade tomater',      antal: '5 paket', klar: false },
      { vara: 'Matolja',              antal: '1',       klar: false },
      { vara: 'Basilika färsk',        antal: '',        klar: false },
      { vara: 'Oregano',              antal: '',        klar: false },
      { vara: 'Paprikapulver',         antal: '',        klar: false },
      { vara: 'Färdigriven parmesan',  antal: '',        klar: false }
    );
    state._middag_bolognese = true;
    _migrated = true;
  }
  if (state.history) {
    state.history.forEach(h => { if (h.locked === undefined) { h.locked = true; _migrated = true; } });
  }
  if (_migrated) markUnsaved(); // autosave will persist the migrated state to DB

  document.getElementById('course-name-input').value = state.course.name || '';
  document.getElementById('course-par-input').value  = state.course.par  || 72;
  buildTabs();
  buildSubTabs();
  updateSubtitle();
  applyLockUI();

  // Populate input values from state
  render();

  // After render, set input values from state (with comma)
  state.klaner.forEach((klan, ki) => {
    klan.spelare.forEach((p, pi) => {
      const nEl = document.getElementById(`inp-${ki}-${pi}-namn`);
      if (nEl) nEl.value = p.namn || '';

      ['hcp','slag','skytte','dart'].forEach(f => {
        const el = document.getElementById(`inp-${ki}-${pi}-${f}`);
        if (el && p[f] !== null) {
          el.value = String(p[f]).replace('.', ',');
          el.classList.add('filled');
        }
      });
    });
    const ksEl = document.getElementById(`klan-slag-${ki}`);
    if (ksEl && klan.klan_slag !== null) {
      ksEl.value = String(klan.klan_slag);
      ksEl.classList.add('filled');
    }
  });
}

async function saveData() {
  clearTimeout(_autoSaveTimer);
  const btn = document.getElementById('save-btn');
  btn.disabled = true;
  btn.textContent = '⏳ Sparar…';
  try {
    const resp = await fetch('/api/save', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(state)
    });
    const res = await resp.json();
    if (res.status === 'ok') {
      showToast('✓ Sparat!');
      unsaved = false;
      document.getElementById('save-status').textContent = '';
    } else {
      showToast('Fel: ' + res.message, true);
    }
  } catch(e) {
    showToast('Kunde inte spara – är servern igång?', true);
  } finally {
    btn.disabled = false;
    btn.textContent = 'Spara';
  }
}

function showToast(msg, err=false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast' + (err ? ' error' : '');
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

function updateSubtitle() {
  document.getElementById('header-sub').textContent =
    `${state.year || ''} · ${state.course.name || '–'} · Par ${state.course.par || '–'}`;
}

// Course inputs
document.getElementById('course-name-input').addEventListener('input', e => {
  state.course.name = e.target.value;
  updateSubtitle();
  markUnsaved();
});
document.getElementById('course-par-input').addEventListener('input', e => {
  state.course.par = e.target.value;
  updateSubtitle();
  markUnsaved();
  render();
});

document.getElementById('save-btn').addEventListener('click', saveData);

window.addEventListener('beforeunload', e => {
  if (unsaved) { e.preventDefault(); e.returnValue = ''; }
});

loadData();

// ══════════════════════════════════════════════
//  AUTO POLL (sync between multiple users)
// ══════════════════════════════════════════════
setInterval(async () => {
  if (unsaved) return;                          // don't overwrite local edits
  if (document.hidden) return;                  // skip when tab is in background
  try {
    const resp = await fetch('/api/data');
    const fresh = await resp.json();
    if (JSON.stringify(fresh) === JSON.stringify(state)) return;
    state = fresh;
    // Re-apply migrations in case new data is missing fields
    if (state.locked === undefined) state.locked = false;
    if (state.history) state.history.forEach(h => { if (h.locked === undefined) h.locked = true; });
    buildTabs();
    buildSubTabs();
    updateSubtitle();
    applyLockUI();
    render();
    if (activeTab !== 'current') renderHistoryView(activeTab);
  } catch(e) { /* silent — server might be momentarily unreachable */ }
}, 10000);

// ══════════════════════════════════════════════
//  WEATHER
// ══════════════════════════════════════════════
const WEATHER_LAT  = 57.8167;
const WEATHER_LON  = 15.1667;
const WEATHER_LOC  = 'Sundsö';
const WEATHER_TTL  = 30 * 60 * 1000; // 30 min cache

const W_EMOJI = {
  clearsky:'☀️', fair:'🌤️', partlycloudy:'⛅', cloudy:'☁️', fog:'🌫️',
  lightrain:'🌦️', rain:'🌧️', heavyrain:'🌧️',
  lightrainshowers:'🌦️', rainshowers:'🌧️', heavyrainshowers:'🌧️',
  lightsleet:'🌨️', sleet:'🌨️', heavysleet:'🌨️',
  lightsleetshowers:'🌨️', sleetshowers:'🌨️', heavysleetshowers:'🌨️',
  lightsnow:'❄️', snow:'❄️', heavysnow:'❄️',
  lightsnowshowers:'❄️', snowshowers:'❄️', heavysnowshowers:'❄️',
  thunder:'⛈️', lightrainandthunder:'⛈️', rainandthunder:'⛈️',
  heavyrainandthunder:'⛈️', lightrainshowersandthunder:'⛈️',
  rainshowersandthunder:'⛈️', heavyrainshowersandthunder:'⛈️',
};

function wEmoji(code) {
  const base = (code || '').replace(/_(day|night|polartwilight)$/, '');
  return W_EMOJI[base] || '🌡️';
}

function wDayLabel(dateStr) {
  const today = new Date().toISOString().slice(0, 10);
  if (dateStr === today) return 'Idag';
  const d = new Date(dateStr + 'T12:00:00');
  return ['Sön','Mån','Tis','Ons','Tor','Fre','Lör'][d.getDay()];
}

function processWeather(data) {
  const days = {};
  for (const entry of data.properties.timeseries) {
    const date = entry.time.slice(0, 10);
    const hour = parseInt(entry.time.slice(11, 13));
    const temp = entry.data.instant.details.air_temperature;
    if (!days[date]) days[date] = { temps: [], symbol: null, rain: 0 };
    days[date].temps.push(temp);
    // Pick symbol from midday entry
    if (hour === 12) {
      const src = entry.data.next_12_hours || entry.data.next_6_hours || entry.data.next_1_hours;
      if (src) days[date].symbol = src.summary.symbol_code;
    }
    if (!days[date].symbol) {
      const src = entry.data.next_6_hours || entry.data.next_1_hours;
      if (src) days[date].symbol = src.summary.symbol_code;
    }
    const precip = entry.data.next_1_hours?.details?.precipitation_amount || 0;
    days[date].rain += precip;
  }
  return Object.entries(days).slice(0, 14).map(([date, d]) => ({
    date,
    min: Math.round(Math.min(...d.temps)),
    max: Math.round(Math.max(...d.temps)),
    symbol: d.symbol,
    rain: Math.round(d.rain * 10) / 10,
  }));
}

function renderWeather(days) {
  const today = new Date().toISOString().slice(0, 10);
  const html = `<span class="w-loc">📍 ${WEATHER_LOC}</span>` +
    days.map(d => {
      const isToday = d.date === today;
      const rain = d.rain > 0 ? `${d.rain} mm` : '';
      return `<div class="w-day${isToday ? ' w-today' : ''}">
        <span class="w-label">${wDayLabel(d.date)}</span>
        <span class="w-icon">${wEmoji(d.symbol)}</span>
        <span class="w-temp">${d.max}° / ${d.min}°</span>
        ${rain ? `<span class="w-rain">💧 ${rain}</span>` : '<span class="w-rain"></span>'}
      </div>`;
    }).join('');
  const el = document.getElementById('weather-content');
  if (el) el.innerHTML = html;
}

async function fetchWeather() {
  try {
    const cacheRaw = sessionStorage.getItem('gc_weather');
    if (cacheRaw) {
      const { ts, days } = JSON.parse(cacheRaw);
      if (Date.now() - ts < WEATHER_TTL) { renderWeather(days); return; }
    }
    const url = `https://api.met.no/weatherapi/locationforecast/2.0/compact?lat=${WEATHER_LAT}&lon=${WEATHER_LON}`;
    const resp = await fetch(url);
    if (!resp.ok) throw new Error(resp.status);
    const data = await resp.json();
    const days = processWeather(data);
    sessionStorage.setItem('gc_weather', JSON.stringify({ ts: Date.now(), days }));
    renderWeather(days);
  } catch (e) {
    const el = document.getElementById('weather-content');
    if (el) el.innerHTML = '<span style="opacity:0.4;font-size:11px;padding:8px">Väderdata ej tillgänglig</span>';
  }
}

fetchWeather();
